{% if is_paginated %}
<div class="pagination">
  {% if page_obj.has_previous %}<a class="btn-muted" href="?page={{ page_obj.previous_page_number }}">Trước</a>{% endif %}
  <span>Trang {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}<a class="btn-muted" href="?page={{ page_obj.next_page_number }}">Sau</a>{% endif %}
</div>
{% endif %}
