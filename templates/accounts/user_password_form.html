{% extends "base.html" %}
{% block title %}Đổi mật khẩu{% endblock %}
{% block heading %}Đổi mật khẩu user{% endblock %}

{% block content %}
<section class="panel form-panel">
  <h2 class="panel-title">{{ target_user.full_name|default:target_user.email }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions-row">
      <button class="btn" type="submit">Lưu mật khẩu</button>
      <a class="btn-muted" href="{% url 'users' %}">Quay lại</a>
    </div>
  </form>
</section>
{% endblock %}
