services:
  web:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - media:/app/media
      - staticfiles:/app/staticfiles
    command: gunicorn phulinhmedia.wsgi:application --bind 0.0.0.0:8000
  celery:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A phulinhmedia worker -l info
  celery-beat:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A phulinhmedia beat -l info
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phulinhmedia
      POSTGRES_USER: phulinhmedia
      POSTGRES_PASSWORD: phulinhmedia
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/static:ro
      - media:/media:ro
    depends_on:
      - web
volumes:
  postgres_data:
  staticfiles:
  media:
